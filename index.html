<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>PR Explorer Madeira · Claude V2.0</title>
<meta name="theme-color" content="#060f0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PR Explorer">
<link rel="apple-touch-icon" href="./icon-180.png">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="./style-claude-v2.0.css">
</head>
<body>
<div id="app">
  <div id="map"></div>
  <div class="vignette"></div>

  <!-- HERO -->
  <header id="hero" class="hero">
    <div class="hero-text">
      <div class="kicker">MADEIRA</div>
      <h1>PR Explorer</h1>
    </div>
    <div class="hero-btns">
      <!-- Ansicht-Pill -->
      <div class="h-pill" id="viewBtn" role="button" aria-label="Ansicht">
        <button id="locateBtn" aria-label="Standort">
          <svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
        </button>
        <div class="h-sep"></div>
        <button id="fitAllBtn" aria-label="Route einpassen">
          <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>
        <div class="h-sep"></div>
        <button id="fullscreenBtn" aria-label="Vollbild">
          <svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        </button>
      </div>
      <!-- Settings + Share Pill -->
      <div class="h-pill">
        <button id="settingsBtn" aria-label="Einstellungen">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <div class="h-sep"></div>
        <button id="shareBtn" aria-label="Teilen" class="btn-inactive">
          <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- FILTER FAB -->
  <button id="filterBtn" class="filter-fab" aria-label="Filter">
    <svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
  </button>

  <!-- FILTER SHEET -->
  <div id="filterSheet" class="sheet hidden">
    <div class="sheet-bar"></div>
    <div class="sheet-head">
      <span class="sheet-title">Filter</span>
      <button id="filterClose" class="sheet-x">&#x2715;</button>
    </div>
    <div class="sheet-body">
      <div class="fsec-label">Region</div>
      <div id="regionFilters" class="chip-row"></div>
      <div class="fsec-label" style="margin-top:16px">Status</div>
      <div id="statusFilters" class="sf-chips"></div>
      <div class="fsec-label" style="margin-top:18px">Distanzen & Belastung</div>
      <div id="rangeFilters" class="range-filters"></div>
      <button id="resetFilters" class="reset-btn">Filter zurücksetzen</button>
    </div>
  </div>

  <!-- MAIN PANEL (Journal / Übersicht / Reisen / Optionen) -->
  <section id="panel" class="panel hidden">
    <div class="sheet-bar"></div>
    <div id="panelContent"></div>
  </section>

  <!-- DETAIL PANEL -->
  <section id="detailPanel" class="panel panel-detail hidden">
    <button id="detailClose" class="detail-close">&#x2715;</button>
    <div class="sheet-bar"></div>
    <div id="detailContent"></div>
  </section>

  <!-- SETTINGS PANEL -->
  <section id="settingsPanel" class="settings-panel hidden">
    <div class="settings-nav">
      <button id="settingsClose" class="s-close-btn">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <span class="s-title">Einstellungen</span>
      <div style="width:44px"></div>
    </div>
    <div id="settingsContent" class="settings-scroll"></div>
  </section>

  <!-- COLOR SHEET -->
  <div id="colorSheet" class="sheet hidden">
    <div class="sheet-bar"></div>
    <div class="sheet-head">
      <button class="sheet-x" onclick="closeColorSheet()">&#x2715;</button>
      <span id="colorSheetTitle" class="sheet-title">Farbe</span>
      <button class="sheet-confirm" onclick="confirmColor()">Sichern</button>
    </div>
    <div class="sheet-body">
      <div class="ctab-row">
        <button class="ctab active" data-tab="grid" onclick="setColorTab('grid')">Gitter</button>
        <button class="ctab" data-tab="sliders" onclick="setColorTab('sliders')">Regler</button>
      </div>
      <div id="colorGrid" class="color-grid"></div>
      <div id="colorSliders" class="color-sliders hidden">
        <div class="sl-row"><span class="sl-lbl">ROT</span>
          <input type="range" id="slR" min="0" max="255" oninput="sliderChanged()">
          <b id="slRv">200</b></div>
        <div class="sl-row"><span class="sl-lbl">GRÜN</span>
          <input type="range" id="slG" min="0" max="255" oninput="sliderChanged()">
          <b id="slGv">100</b></div>
        <div class="sl-row"><span class="sl-lbl">BLAU</span>
          <input type="range" id="slB" min="0" max="255" oninput="sliderChanged()">
          <b id="slBv">50</b></div>
        <div class="hex-row">
          <span>sRGB Hex #</span>
          <input type="text" id="hexInput" maxlength="6" placeholder="5AC8FA" oninput="hexChanged()">
        </div>
      </div>
      <div class="cp-preview">
        <div id="colorSwatch" class="cp-swatch"></div>
        <span id="colorSwatchHex" class="cp-hex"></span>
      </div>
    </div>
  </div>

  <!-- ICON SHEET -->
  <div id="iconSheet" class="sheet hidden">
    <div class="sheet-bar"></div>
    <div class="sheet-head">
      <button class="sheet-x" onclick="closeIconSheet()">&#x2715;</button>
      <span class="sheet-title">Icon wählen</span>
      <button class="sheet-confirm" onclick="confirmIcon()">Sichern</button>
    </div>
    <div class="sheet-body">
      <div class="icon-search">
        <input type="text" id="iconSearchInput" placeholder="🔍  Stichwort…" oninput="filterIcons(this.value)">
      </div>
      <div id="iconGrid" class="icon-grid"></div>
    </div>
  </div>

  <!-- DATE SHEET -->
  <div id="dateSheet" class="sheet hidden">
    <div class="sheet-bar"></div>
    <div class="sheet-head">
      <button class="sheet-x" onclick="closeDateSheet()">&#x2715;</button>
      <span class="sheet-title">Reisezeitraum</span>
      <button class="sheet-confirm" onclick="confirmDate()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>
    <div class="sheet-body">
      <div id="dateSub" class="date-sub"></div>
      <div id="calWidget" class="cal-widget"></div>
      <div id="icsExport" style="margin-top:14px"></div>
    </div>
  </div>

  <!-- BACKDROP -->
  <div id="backdrop" class="backdrop hidden" onclick="closeAllSheets()"></div>

  <!-- BOTTOM NAV — Style C -->
  <nav id="bottomNav" class="bnav">
    <button data-tab="overview">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <b>Übersicht</b>
    </button>
    <button data-tab="journal">
      <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <b>Journal</b>
    </button>
    <button data-tab="map" class="active">
      <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
      <b>Karte</b>
    </button>
    <button data-tab="trips">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <b>Reisen</b>
    </button>
    <button data-tab="options">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <b>Optionen</b>
    </button>
  </nav>

  <button id="fullscreenClose" class="fs-close hidden">&#x2715;</button>
  <div id="toast"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="./pr-data.js"></script>
<script src="./app-claude-v2.0.js"></script>
</body>
</html>
